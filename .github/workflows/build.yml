name: Build Project

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Yarn 1.x (Corepack)
        run: corepack enable && corepack prepare yarn@1.22.22 --activate

      - run: yarn install --frozen-lockfile

      - name: Build projeto
        run: yarn build
